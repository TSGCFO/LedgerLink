<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Invoice List</title>
</head>
<body>

<h1>Invoices</h1>

<table class="table table-striped">
    <thead>
    <tr>
        <th>Invoice ID</th>
        <th>Customer</th>
        <th>Date</th>
        <th>Total Amount</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    {% for invoice in invoices %}
        <tr>
            <td>{{ invoice.id }}</td>
            <td>{{ invoice.customer.company_name }}</td>
            <td>{{ invoice.invoice_date }}</td>
            <td>${{ invoice.total_amount }}</td>
            <td>
                <a href="{% url 'invoice_detail' invoice.id %}" class="btn btn-info btn-sm">View</a>
                <a href="{% url 'export_report' %}?format=pdf&invoice_id={{ invoice.id }}" class="btn btn-primary btn-sm">Download PDF</a>
            </td>
        </tr>
    {% endfor %}
    </tbody>
</table>

</body>
</html>
