<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Billing Report</title>
</head>
<body>

<h1>Billing Report</h1>
<p><strong>Generated On:</strong> {{ report_date }}</p>

<h3>Report Details</h3>
<table class="table table-striped">
    <thead>
    <tr>
        <th>Service</th>
        <th>Cost</th>
    </tr>
    </thead>
    <tbody>
    {% for detail in report_details %}
        <tr>
            <td>{{ detail.service }}</td>
            <td>${{ detail.cost }}</td>
        </tr>
    {% endfor %}
    </tbody>
</table>

<h3>Total Amount: ${{ report_total }}</h3>

<a href="{% url 'invoice_list' %}" class="btn btn-secondary">Back to Invoices</a>
<a href="{% url 'export_report' %}?format=pdf" class="btn btn-primary">Download as PDF</a>

</body>
</html>
