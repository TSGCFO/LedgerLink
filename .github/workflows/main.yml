name: LedgerLink CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  lint:
    name: Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linters
        run: npm run lint

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ledgerlink_test
        ports:
          - 5432:5432
        # Health check to ensure postgres is ready before starting tests
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run migrations
        run: python manage.py migrate --settings=LedgerLink.test_settings
      
      - name: Run backend tests
        run: |
          ./run_tests.sh --cov
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v3
        with:
          name: backend-coverage
          path: coverage/
          if-no-files-found: warn

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run frontend tests
        run: |
          cd frontend
          npm test -- --coverage
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v3
        with:
          name: frontend-coverage
          path: frontend/coverage/
          if-no-files-found: warn

  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ledgerlink_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          npm ci
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run migrations
        run: python manage.py migrate --settings=LedgerLink.test_settings
      
      - name: Run consumer tests
        run: npm run test:pact
      
      - name: Start Django server for provider verification
        run: |
          python manage.py runserver --settings=LedgerLink.test_settings 8000 &
          # Wait for server to start
          sleep 5
      
      - name: Verify provider
        run: npm run test:pact:verify
      
      - name: Upload pact files
        uses: actions/upload-artifact@v3
        with:
          name: pact-files
          path: pacts/
          if-no-files-found: warn
      
      # Optional: Publish to Pact Broker if on main branch
      - name: Publish pacts to broker
        if: github.ref == 'refs/heads/main'
        run: npm run test:pact:publish
        env:
          PACT_BROKER_URL: ${{ secrets.PACT_BROKER_URL }}
          PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN }}

  # This workflow stores the combined coverage data
  coverage-report:
    name: Combined Coverage Report
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Download backend coverage
        uses: actions/download-artifact@v3
        with:
          name: backend-coverage
          path: backend-coverage
      
      - name: Download frontend coverage
        uses: actions/download-artifact@v3
        with:
          name: frontend-coverage
          path: frontend-coverage
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install coverage tools
        run: npm install -g nyc istanbul-merge
      
      - name: Merge coverage reports
        run: |
          istanbul-merge --out merged-coverage/coverage-final.json backend-coverage/coverage-final.json frontend-coverage/coverage-final.json
          nyc report --reporter=text --reporter=lcov --reporter=html -t merged-coverage
      
      - name: Upload merged coverage report
        uses: actions/upload-artifact@v3
        with:
          name: merged-coverage-report
          path: coverage/
      
      # Optional: Add a coverage reporting service here
      # - name: Report to Codecov
      #   uses: codecov/codecov-action@v3
      #   with:
      #     files: ./coverage/lcov.info