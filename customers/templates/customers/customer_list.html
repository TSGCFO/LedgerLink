<!-- customers/templates/customers/customer_list.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <title>Customer List</title>
</head>
<body>
    <h1>Customers</h1>
    <ul>
        {% for customer in customers %}
            <li>
                <a href="{% url 'customer_detail' customer.pk %}">{{ customer.company_name }}</a>
            </li>
        {% endfor %}
    </ul>
    <a href="{% url 'customer_add' %}">Add New Customer</a>
</body>
</html>
