<!DOCTYPE html>
<html lang="en">
<head>
    <title>{% block title %}Customer Form{% endblock %}</title>
</head>
<body>
    <h1>{% block heading %}Customer Form{% endblock %}</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save</button>
    </form>
    <a href="{% url 'customer_list' %}">Back to Customer List</a>
</body>
</html>
